<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Complete | Computech IT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0a1f44, #163d7a);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 14px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.6s ease-in-out;
    }

    .icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: #2e7d32;
    }

    h1 {
      font-size: 24px;
      color: #0a1f44;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #163d7a;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0a1f44;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #777;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 35px 25px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="icon">!</div>
    <h1>Certificate Verification</h1>
    <p>
      The verification portal has been successfully moved to our official website. 
      Please click the button below to verify your certificate authenticity.
    </p>

    <a href="https://www.computechit.in/verify.html" class="btn">
      Verify Certificate
    </a>

    <div class="footer">
      © 2026 Computech IT. All rights reserved.
    </div>
  </div>

</body>
</html>
